[global/wm]
include-file = $HOME/.config/polybar/themes/mocha.ini

[section/default]
font-0 = JetBrainsMono Nerd Font:size=23:weight=bold;6
font-1 = JetBrainsMono Nerd Font:size=20;4

background   = #00
foreground   = ${colors.text}
border-color = ${colors.mantle}

height        = 32pt
padding       = 3
line-size     = 3pt
module-margin = 1

offset-y          = 0.5%
override-redirect = true
# wm-restack        = i3

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc = true

[bar/bottom-bar]
inherit = section/default 

bottom = true

modules-left   = i3 voyager docker
modules-center = date
modules-right  = pulseaudio network battery

scroll-up   = "#i3.prev"
scroll-down = "#i3.next"

[bar/top-bar]
inherit = section/default 

modules-left  = menu-commands
modules-right = cpu memory temperature

cursor-scroll = ns-resize

[module/i3]
type = internal/i3

strip-wsnumbers = true
fuzzy-match     = false

ws-icon-0       = 1: 1;î‍•
ws-icon-1       = 2: 2;î‌…
ws-icon-2       = 3: 3;î¢¤
ws-icon-3       = 4: 4;ï‡؟
ws-icon-4       = 5: 5;îک²
ws-icon-5       = 6: 6;َ°ŒŒ
ws-icon-default = َ°“©

format = <label-state>

label-focused   = %{F#313244}î‚¶%{B#313244}%{F#89b4fa} %icon% %{B#00}%{F#313244}î‚´ %{B-}%{F-}
label-unfocused = %{F#181825}î‚¶%{B#181825}%{F#a6adc8} %icon% %{B#00}%{F#181825}î‚´ %{B-}%{F-}
label-visible   = %{F#181825}î‚¶%{B#181825}%{F#a6adc8} %icon% %{B#00}%{F#181825}î‚´ %{B-}%{F-}
label-urgent    = %{F#313244}î‚¶%{B#313244}%{F#94e2d5} %icon% %{B#00}%{F#313244}î‚´ %{B-}%{F-}

[module/date]
type = internal/date

interval = 1

date     = %d/%m/%Y %H:%M:%S
date-alt = %H:%M

format = <label>

label = %{F#89b4fa}î‚¶%{B#89b4fa}%{F#11111b}ïپ³ %{B#181825}%{F#a6adc8}%{T2} %date%%{B#00}%{F#181825}%{T1}î‚´%{B-}%{F-}

[module/voyager]
type = custom/script

exec = fish -c voyager_get_layer

interval = 0.3

label = %{F#89b4fa}î‚¶%{B#89b4fa}%{F#11111b}î؛¨ %{B#181825}%{F#a6adc8}%{T2} %output% %{B#00}%{F#181825}%{T1}î‚´%{B-}%{F-}

[module/docker]
type = custom/script

exec = docker ps -q | wc -l

interval = 1

label = %{F#89b4fa}î‚¶%{B#89b4fa}%{F#11111b}î‍° %{B#181825}%{F#a6adc8}%{T2} %output% %{B#00}%{F#181825}%{T1}î‚´%{B-}%{F-}

[module/menu-commands]
type = custom/menu

expand-right = true

menu-0-0      = %{F#89b4fa} î‚¶%{B#89b4fa}%{F#11111b} َ°ھ¯ %{B#00}%{F#89b4fa}î‚´%{B-}%{F-}
