[global/wm]
include-file = $HOME/.config/polybar/themes/mocha.ini

[section/default]
font-0 = JetBrainsMono Nerd Font:size=23:weight=bold;6
font-1 = JetBrainsMono Nerd Font:size=20;4
font-2 = JetBrainsMono Nerd Font:size=20:weight=bold;6

background   = ${colors.mantle}
foreground   = ${colors.text}
border-color = ${colors.mantle}

line-size = 3pt

module-margin = 1

separator            = "%{T3} "
separator-foreground = ${colors.overlay2}

cursor-click = pointer

enable-ipc = true

[section/bottom-bar]
bottom = true
height = 32pt

override-redirect = true

[bar/bottom-left-bar]
inherit = section/default section/bottom-bar

width    = 11%
offset-x = 1.7% 
offset-y = 0.5%

modules-left = i3

cursor-scroll = ns-resize
scroll-up   = "#i3.prev"
scroll-down = "#i3.next"

[bar/bottom-centre-bar]
inherit = section/default section/bottom-bar

width        = 12%
padding-left = 2
offset-x     = 44.3% 
offset-y     = 0.5%

modules-left = date

[bar/bottom-right-bar]
inherit = section/default section/bottom-bar

width        = 9.5%
padding-left = 2
offset-x     = 88.9% 
offset-y     = 0.5%

modules-left = pulseaudio battery

[module/i3]
type = internal/i3

strip-wsnumbers = true
fuzzy-match     = false

ws-icon-0       = 1: 1;󰡗
ws-icon-1       = 2: 2;󰡚
ws-icon-2       = 3: 3;󰡛
ws-icon-3       = 4: 4;󰡜
ws-icon-4       = 5: 5;󰡘
ws-icon-default = 󰡙

format = <label-state>

label-focused   = %{B#181825}%{F#313244}%{B#313244}%{F#89b4fa} %icon% %{B#181825}%{F#313244}%{B-}%{F-}
label-unfocused = %{B#181825}%{F#a6adc8}  %icon%  %{B-}%{F-}
label-visible   = %{B#181825}%{F#313244}  %icon%  %{B-}%{F-}
label-urgent    = %{B#181825}%{F#94e2d5}  %icon%  %{B-}%{F-}

[module/date]
type     = internal/date
interval = 1

date     = %d/%m/%Y %H:%M:%S
date-alt = %H:%M

format-prefix            = " "
format-prefix-foreground = ${colors.blue}
format = <label>

label            = %{T2}%date%
label-foreground = ${colors.subtext0}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix            = "󰝚 "
format-volume-prefix-foreground = ${colors.blue}
format-volume                   = <label-volume>

label-volume     = %{T2}%percentage%%
label-volume-foreground = ${colors.subtext0}

label-muted            = "󰝛 "
label-muted-foreground = ${colors.blue}

[module/battery]
type        = internal/battery
full-at     = 97
time-format = %H:%M

format-charging            = <animation-charging> <label-charging>
format-charging-foreground = ${colors.blue}

format-discharging            = <animation-discharging> <label-discharging>
format-discharging-foreground = ${colors.peach}

format-full            = <ramp-capacity> <label-full>
format-full-foreground = ${colors.green}

format-low            = <animation-low> <label-low> 
format-low-foreground = ${colors.red}

label-charging    = %percentage%% (%time%)
label-discharging = %percentage%%
label-full        = %percentage%%
label-low         = %percentage%% (%time%)

ramp-capacity-0 =  
ramp-capacity-1 =  
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

bar-capacity-width = 10

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 

animation-charging-framerate = 750

animation-discharging-0 = 
animation-discharging-1 = 
animation-discharging-2 = 
rnimation-discharging-3 = 
animation-discharging-4 = 

animation-discharging-framerate = 500

animation-low-0         = !
animation-low-1         = 
animation-low-framerate = 200

[module/cpu]
type                     = internal/cpu
interval                 = 2
format-prefix            = " "
format-prefix-foreground = ${colors.blue}
label                    = %percentage:2%%
label-foreground         = ${colors.blue}

[module/memory]
type                     = internal/memory
interval                 = 2
format-prefix            = " "
format-prefix-foreground = ${colors.blue}
label                    = %percentage_used:2%%
label-foreground         = ${colors.blue}

[settings]
screenchange-reload = true
pseudo-transparency = true
