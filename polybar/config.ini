[global/wm]
include-file = $HOME/.config/polybar/themes/mocha.ini

[colors]
background = ${colors.crust}
background-alt = ${colors.base}
foreground = ${colors.text}
primary = ${colors.blue}
secondary = ${colors.peach}
alert = ${colors.red}
disabled = ${colors.overlay0}

[bar/bottom-bar]
bottom = true
width = 100%
height = 32pt

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-color = ${colors.crust}

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.overlay0}

font-0 = JetBrains Mono Nerd Font:size=20;2

modules-left = i3
modules-right = cpu memory pulseaudio battery date

cursor-click = pointer
cursor-scroll = ns-resize

scroll-up = "#i3.prev"
scroll-down = "#i3.next"

enable-ipc = true

[module/i3]
type = internal/i3

strip-wsnumbers = true
fuzzy-match = false

ws-icon-0 = 1: 1;󰡗
ws-icon-1 = 2: 2;󰡚
ws-icon-2 = 3: 3;󰡛
ws-icon-3 = 4: 4;󰡜
ws-icon-4 = 5: 5;󰡘
ws-icon-default = 󰡙

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.crust}
label-mode-background = ${colors.secondary}

label-focused = %icon%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.base}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 2

label-visible = %icon%
label-visible-underline = %{colors.primary}
label-visible-padding = 2

label-urgent = %icon%
label-urgent-foreground= ${colors.alert}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.primary}

format-discharging = <animation-discharging> <label-discharging>
format-discharging-foreground = ${colors.peach}

format-full = <ramp-capacity> <label-full>
format-full-foreground = ${colors.green}

format-low = <animation-low> <label-low> 
format-low-foreground = ${colors.alert}

label-charging = %percentage%% (%time%)
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%% (%time%)

ramp-capacity-0 =  
ramp-capacity-1 =  
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

bar-capacity-width = 10

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 

animation-charging-framerate = 750

animation-discharging-0 = 
animation-discharging-1 = 
animation-discharging-2 = 
animation-discharging-3 = 
animation-discharging-4 = 

animation-discharging-framerate = 500

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/date]
type = internal/date
interval = 1

date = %d/%m/%Y %H:%M:%S
date-alt = %H:%M

label =  %date%
label-foreground = ${colors.mauve}

[settings]
screenchange-reload = true
pseudo-transparency = true
