active_tab_title_template "{fmt.bg.default}{fmt.fg._b4befe}{fmt.bg.tab}{fmt.fg.tab}  {title}{' {}  '.format(sup.num_windows) if num_windows > 1 else ''}{fmt.bg.default}{fmt.fg._b4befe}"

confirm_os_window_close            0
copy_on_select                     clipboard
enable_audio_bell                  no
hide_window_decorations            yes
remember_window_size               yes
macos_option_as_alt                yes
macos_quit_when_last_window_closed yes

clear_all_shortcuts yes

map ctrl+enter new_tab_with_cwd !neighbor

map ctrl+tab       next_tab
map ctrl+shift+tab previous_tab

map alt+shift+ctrl+down scroll_line_down
map alt+shift+ctrl+up   scroll_line_up

map alt+shift+ctrl+page_down scroll_page_down
map alt+shift+ctrl+page_up   scroll_page_up

map alt+shift+ctrl+enter scroll_to_prompt 1
map alt+shift+ctrl+space scroll_to_prompt -1
map alt+shift+ctrl+esc   scroll_to_prompt 0

map alt+shift+ctrl+2 goto_tab 1
map alt+shift+ctrl+4 goto_tab 2
map alt+shift+ctrl+6 goto_tab 3
map alt+shift+ctrl+8 goto_tab 4

map alt+shift+ctrl+, move_tab_backward
map alt+shift+ctrl+. move_tab_forward

map alt+shift+ctrl+c       clear_terminal to_cursor_scroll active
map alt+shift+ctrl+super+c clear_terminal clear active

map alt+shift+ctrl+e       launch --stdin-source=@last_cmd_output --stdin-add-line-wrap-markers --type=tab hx
map alt+shift+ctrl+super+e launch --stdin-source=@last_visited_cmd_output --stdin-add-line-wrap-markers --type=tab hx

map alt+shift+ctrl+m select_tab

map alt+shift+ctrl+s       launch --stdin-source=@screen --stdin-add-line-wrap-markers --type=tab hx
map alt+shift+ctrl+super+s launch --stdin-source=@screen_scrollback --stdin-add-line-wrap-markers --type=tab hx

map alt+shift+ctrl+t set_tab_title

map alt+shift+ctrl+z launch --type=tab hx ~/.config/kitty/kitty.conf
map alt+shift+ctrl+super+z load_config_file

