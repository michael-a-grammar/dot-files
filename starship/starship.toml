"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$elixir\
$elm\
$erlang\
$ruby\
$rust\
$cmd_duration\
$status\
$line_break\
$jobs\
$character\
"""

# right_format = """
# $git_metrics\
# $git_status \
# $time \
# $battery\
# """

command_timeout = 10000
