import = ["~/.config/alacritty/themes/catppuccin-mocha.toml",]

[env]
TERM = "alacritty"

[window]
decorations = "None"
startup_mode = "Maximized"
resize_increments = true

[window.padding]
x = 10
y = 0

[font]
size = 10

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[selection]
save_to_clipboard = true

[cursor]
blink_timeout = 0

[cursor.style]
blinking = "Never"

[cursor.vi_mode_style]
blinking = "Always"

[mouse]
hide_when_typing = true

[hints]
alphabet = "ntesirlpufywhdcxmgoakvqzjb"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollLineUp"
key = "ArrowUp"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollLineDown"
key = "ArrowDown"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollToTop"
key    = "Home"
mods   = "Control"

[[keyboard.bindings]]
action = "ScrollToBottom"
key    = "End"
mods   = "Control"
